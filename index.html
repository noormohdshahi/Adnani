<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Adnani Biradari"/>
<meta name="application-name" content="Adnani Biradari"/>
<meta name="theme-color" content="#1a5c38"/>
<meta name="description" content="Muslim Halwai Adnani Biradari Community App"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231a5c38'/><text y='.9em' font-size='80' text-anchor='middle' x='50'>🕌</text></svg>"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Muslim Halwai Adnani Biradari</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Poppins:wght@400;500;600;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0f3d25;overflow-x:hidden}
#root{max-width:480px;margin:0 auto;min-height:100vh}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(50px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes splashPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.fade-in{animation:fadeIn .4s ease both}
.slide-up{animation:slideUp .45s ease both}
.card{transition:transform .15s,box-shadow .15s}
.card:active{transform:scale(.97)}
button{cursor:pointer;transition:all .15s}
button:active{opacity:.83}
input,textarea,select{outline:none;font-family:inherit}
.sx{overflow-x:auto;-webkit-overflow-scrolling:touch}
.sx::-webkit-scrollbar{height:0}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#c9a84c;border-radius:4px}
.qs::-webkit-scrollbar-thumb{background:#4ecdc4}
.spin{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
.spin-g{width:32px;height:32px;border:3px solid rgba(78,205,196,.2);border-top-color:#4ecdc4;border-radius:50%;animation:spin .9s linear infinite}
.otp-box{width:47px;height:54px;text-align:center;font-size:22px;font-weight:700;border:2px solid #f5edda;border-radius:12px;background:#fff;font-family:Poppins,sans-serif;color:#0f3d25}
.otp-box:focus{border-color:#1a5c38;box-shadow:0 0 0 3px rgba(26,92,56,.15)}
.inp{width:100%;padding:13px 16px;border-radius:13px;border:1.5px solid #f5edda;background:#fff;font-size:14px;font-family:Poppins,sans-serif;color:#1a1a1a}
.inp:focus{border-color:#1a5c38;box-shadow:0 0 0 3px rgba(26,92,56,.1)}
.btn-g{background:linear-gradient(135deg,#1a5c38,#2d7a4f);color:#fff;border:none;border-radius:13px;padding:15px;font-size:15px;font-family:Poppins,sans-serif;font-weight:700;width:100%;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-au{background:linear-gradient(135deg,#c9a84c,#e6c46a);color:#0f3d25;border:none;border-radius:13px;padding:13px 20px;font-size:14px;font-family:Poppins,sans-serif;font-weight:700;cursor:pointer}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:600;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:480px;padding:22px 20px;max-height:92vh;overflow-y:auto;animation:slideUp .3s ease}
.bub-me{background:linear-gradient(135deg,#1a5c38,#2d7a4f);color:#fff;border-radius:18px 18px 4px 18px;padding:10px 14px;max-width:78%;font-size:13px;font-family:Georgia,serif;line-height:1.55}
.bub-them{background:#f0f0f0;color:#1a1a1a;border-radius:18px 18px 18px 4px;padding:10px 14px;max-width:78%;font-size:13px;font-family:Georgia,serif;line-height:1.55}
</style>

<script>
// ── PWA Service Worker — enables Add to Home Screen ──
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'biradari-v1';
    self.addEventListener('install', e => {
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(clients.claim());
    });
    self.addEventListener('fetch', e => {
      // Cache-first for the app shell
      e.respondWith(
        caches.match(e.request).then(cached => cached || fetch(e.request).catch(() => cached))
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, { scope: '/' })
    .then(() => console.log('SW registered'))
    .catch(e => console.log('SW skipped:', e.message));
}

// ── Inline Web App Manifest ──────────────────────────
const manifest = {
  name: "Muslim Halwai Adnani Biradari",
  short_name: "Adnani Biradari",
  description: "Muslim Halwai Adnani Biradari Community App",
  start_url: "./",
  display: "standalone",
  orientation: "portrait",
  background_color: "#1a5c38",
  theme_color: "#1a5c38",
  icons: [
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='80' fill='%231a5c38'/><text y='380' font-size='360' text-anchor='middle' x='256'>🕌</text></svg>", sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
  ]
};
const mBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
const mUrl  = URL.createObjectURL(mBlob);
const mLink = document.createElement('link');
mLink.rel   = 'manifest';
mLink.href  = mUrl;
document.head.appendChild(mLink);

// ── Show custom install banner ────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;

  // Show install button after 3 seconds
  setTimeout(() => {
    const banner = document.getElementById('pwa-install-banner');
    if (banner) banner.style.display = 'flex';
  }, 3000);
});

window.addEventListener('appinstalled', () => {
  const banner = document.getElementById('pwa-install-banner');
  if (banner) banner.remove();
  deferredPrompt = null;
});

function installPWA() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      const banner = document.getElementById('pwa-install-banner');
      if (banner) banner.style.display = 'none';
    });
  } else {
    // Fallback: show manual instructions
    alert('इंस्टॉल करने के लिए:\n\n📱 Android: Browser menu (⋮) → "Add to Home screen"\n\n🍎 iPhone: Share button (□↑) → "Add to Home Screen"');
  }
}
</script>
</head>
<body>
<!-- PWA Install Banner -->
<div id="pwa-install-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;
  background:linear-gradient(135deg,#1a5c38,#2d7a4f);padding:14px 16px;
  align-items:center;gap:12px;z-index:99999;
  box-shadow:0 -4px 20px rgba(0,0,0,.3);animation:slideUp .4s ease">
  <span style="font-size:28px">🕌</span>
  <div style="flex:1">
    <div style="color:white;font-weight:700;font-size:14px;font-family:Poppins,sans-serif">
      App Install करें</div>
    <div style="color:rgba(255,255,255,.75);font-size:11px;font-family:Poppins,sans-serif">
      Home Screen पर shortcut बनाएं</div>
  </div>
  <button onclick="installPWA()" style="background:#c9a84c;color:#1a1a1a;border:none;
    border-radius:10px;padding:10px 16px;font-weight:700;font-size:13px;
    font-family:Poppins,sans-serif;cursor:pointer">Install ➜</button>
  <button onclick="document.getElementById('pwa-install-banner').style.display='none'"
    style="background:rgba(255,255,255,.15);color:white;border:none;border-radius:8px;
    width:30px;height:30px;font-size:16px;cursor:pointer">×</button>
</div>

<div id="root"></div>
